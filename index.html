];
const TRENDING=[

  {name:"Zoom Fly 5",price:"$160",img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&q=80"},
  {name:"Metcon 8",price:"$130",img:"https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=400&q=80"},
  {name:"Blazer Mid",price:"$100",img:"https://images.unsplash.com/photo-1603787081207-362bcef7c144?w=400&q=80"},
  {name:"Free Run 5",price:"$90",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80"},

function useCountdown(h,m,s){
  const[t,setT]=useState({h,m,s});
  useEffect(()=>{
    const id=setInterval(()=>setT(p=>{
      let{h,m,s}=p;
      if(s>0)return{h,m,s:s-1};
      if(m>0)return{h,m:m-1,s:59};
      if(h>0)return{h:h-1,m:59,s:59};
      return{h:0,m:0,s:0};
    }),1000);
    return()=>clearInterval(id);
  },[]);
  return t;
}

function App(){
  const cd=useCountdown(5,47,23);
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[selSizes,setSelSizes]=useState({});

  const[loading,setLoading]=useState(false);
  const[email,setEmail]=useState("");
  const[subscribed,setSubscribed]=useState(false);
  const chatRef=useRef(null);

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs,loading]);

  const addToCart=p=>{

      return[...c,{...p,qty:1}];
    });
    setCartOpen(true);
  };
  const removeFromCart=name=>setCart(c=>c.filter(x=>x.name!==name));
  const cartCount=cart.reduce((a,x)=>a+x.qty,0);
  const cartTotal=cart.reduce((a,x)=>a+x.price*x.qty,0);

  const sendMsg=async()=>{
    const text=input.trim();
    if(!text||loading)return;
    setInput("");
    setMsgs(p=>[...p,{role:"user",text}]);
    setLoading(true);
    try{
      const history=msgs.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}));
      history.push({role:"user",content:text});
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"Eres el asistente de ventas del programa oficial de asociados Nike para todo el mundo. Conoces toda la línea Nike: calzado running, basketball, lifestyle, ropa y accesorios. Productos destacados: Air Max 270 ($180), Air Force 1 '07 ($110), React Infinity Run ($160), Air Jordan 1 Mid ($130). Responde en el idioma del cliente. Sé conciso y útil. Máximo 2-3 párrafos.",
          messages:history,
        }),
      });
      const data=await res.json();
      const reply=data.content?.map(b=>b.text).join("")||"Lo siento, intenta de nuevo.";
      setMsgs(p=>[...p,{role:"ai",text:reply}]);
    }catch{
      setMsgs(p=>[...p,{role:"ai",text:"Error de conexión. Por favor intenta nuevamente."}]);
    }
    setLoading(false);
  };

  return(
    <>
      {/* CART */}
      <div className={`cart-drawer${cartOpen?" open":""}`}>
        <div className="cd-head">
          <span className="cd-htitle">Mi Carrito ({cartCount})</span>
          <button className="cd-close" onClick={()=>setCartOpen(false)}>✕</button>
        </div>
        <div className="cd-body">
          {cart.length===0
            ?<div className="cd-empty">Tu carrito está vacío.<br/>¡Agrega tus favoritos Nike!</div>
            :cart.map(item=>(

                <img src={item.img} alt={item.name}/>
                <div className="cd-item-info">
                  <div className="cd-item-name">{item.name}</div>
                  <div className="cd-item-meta">{item.cat} · Cant: {item.qty}</div>
                  <div className="cd-item-price">${(item.price*item.qty).toLocaleString()}</div>
                  <button className="cd-remove" onClick={()=>removeFromCart(item.name)}>Eliminar</button>
                </div>
              </div>
            ))
          }
        </div>
        {cart.length>0&&(
          <div className="cd-foot">
            <div className="cd-total">
              <span className="cd-total-label">Total</span>
              <span className="cd-total-price">${cartTotal.toLocaleString()}</span>
            </div>
            <button className="cd-checkout">Finalizar Compra →</button>
          </div>
        )}

      {cartOpen&&<div className="overlay" onClick={()=>setCartOpen(false)}/>}

      {/* NAV */}
      <nav>
        <div className="n-logo">NIKE ✓</div>
        <div className="n-links">
          <a href="#categorias">Categorías</a>
          <a href="#mas-vendidos">Más Vendidos</a>
          <a href="#ofertas">Ofertas</a>
          <a href="#asistente">Asistente IA</a>
        </div>
        <div className="n-right">
          <button className="n-lang">🌐 ES</button>
          <button className="n-cart" onClick={()=>setCartOpen(true)}>
            🛒{cartCount>0&&<span className="cart-badge">{cartCount}</span>}
          </button>
        </div>
      </nav>

      {/* TICKER */}
      <div className="ticker">
        <div className="t-track">
          {[...TICKER,...TICKER].map((t,i)=><span key={i} className="t-item">{t} · </span>)}
        </div>
      </div>

      {/* HERO */}
      <div className="hero">
        <div className="hero-bg"/><div className="hero-ov"/>
        <div className="hero-content">
          <div className="h-tag">Programa Oficial de Asociados · 2026</div>
          <h1 className="h-title">JUST<br/><span className="accent">DO IT.</span></h1>
          <p className="h-desc">Las mejores zapatillas, ropa y accesorios Nike del mundo. Precios exclusivos para asociados, envíos a más de 90 países.</p>
          <div className="h-btns">
            <button className="btn-red" onClick={()=>document.getElementById('mas-vendidos').scrollIntoView({behavior:'smooth'})}>Ver más vendidos</button>
            <button className="btn-wh" onClick={()=>document.getElementById('ofertas').scrollIntoView({behavior:'smooth'})}>Ofertas especiales</button>
          </div>
        </div>
        <div className="hero-aside">
          <div><div className="hs-num">90+</div><div className="hs-lbl">Países con envío</div></div>
          <div><div className="hs-num">6.4K</div><div className="hs-lbl">Productos</div></div>
          <div><div className="hs-num">4.9★</div><div className="hs-lbl">Valoración</div></div>
        </div>
      </div>

        {CATS.map(c=>(
          <div key={c.name} className="cat-card">
            <img src={c.img} alt={c.name} className="cat-img" loading="lazy"/>
            <div className="cat-ov"/>
            <div className="cat-label">
              <span className="cat-name">{c.name}</span>
              <span className="cat-count">{c.count}</span>
            </div>
            <div className="cat-arrow">→</div>

      {/* BEST SELLERS */}

        <div className="s-head">
          <div><span className="s-tag">Lo más popular a nivel mundial</span><h2 className="s-title">MÁS VENDIDOS</h2></div>
          <button className="s-more">Ver catálogo completo →</button>
        </div>
        <div className="prod-grid">
          {PRODUCTS.map((p,i)=>(
            <div key={i} className="prod-card">
              <div className="prod-img-wrap">
                <img src={p.img} alt={p.name} className="prod-img" loading="lazy"/>
                <span className={`badge badge-${p.badge}`}>{p.badge==="sale"?"OFERTA":p.badge==="new"?"NUEVO":"🔥 POPULAR"}</span>

              </div>
              <div className="prod-info">

                <div className="prod-name">{p.name}</div>
                <div className="prod-price">

      {/* OFFERS */}
      <section className="offers" id="ofertas">
        <div className="offers-inner">
          <div className="offer-left">
            <div><span className="s-tag">Oferta exclusiva · Tiempo limitado</span><h2 className="s-title">FLASH SALE<br/>HASTA 40% OFF</h2></div>
            <div className="offer-countdown">
              <div className="cd-block"><div className="cd-num">{String(cd.h).padStart(2,"0")}</div><div className="cd-lbl">Horas</div></div>
              <div className="cd-sep">:</div>
              <div className="cd-block"><div className="cd-num">{String(cd.m).padStart(2,"0")}</div><div className="cd-lbl">Min</div></div>
              <div className="cd-sep">:</div>
              <div className="cd-block"><div className="cd-num">{String(cd.s).padStart(2,"0")}</div><div className="cd-lbl">Seg</div></div>
            </div>
            <div className="offer-items">
              {["Air Max 270 — $180 (antes $220)","React Infinity Run — $160 (antes $200)","Pegasus 40 — $120 (antes $150)","Running hasta 35% OFF"].map(o=><div key={o} className="offer-item">{o}</div>)}
            </div>
            <button className="btn-red">Ver todas las ofertas →</button>
          </div>
          <div className="offer-right">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=800&q=85" alt="Oferta" loading="lazy"/>
            <div className="offer-right-ov"/>
            <div className="offer-price-tag"><div className="opt-label">Desde</div><div className="opt-price">$89</div></div>
          </div>
        </div>
      </section>

      {/* TRENDING */}
      <section className="s" style={{background:"var(--gray)"}}>
        <div className="s-head">

          <button className="s-more">Ver todos →</button>
        </div>
        <div className="trend-scroll">
          {TRENDING.map((t,i)=>(
            <div key={i} className="trend-card">

            </div>
          ))}
        </div>
      </section>

      {/* GLOBAL */}
      <section className="s" style={{background:"linear-gradient(135deg,#0f0f0f 0%,#1a0a0a 100%)",borderTop:"1px solid var(--border)"}}>
        <div className="global-inner">
          <div>
            <span className="s-tag">Enviamos a todo el mundo</span>
            <h2 className="s-title">ALCANCE<br/>GLOBAL</h2>
            <p className="global-desc">Compra desde cualquier país y recibe tu pedido Nike directamente en tu puerta. Rastreo en tiempo real, devoluciones gratuitas y atención en más de 20 idiomas.</p>
            <div className="country-grid">{COUNTRIES.map(c=><div key={c} className="country-pill">{c}</div>)}</div>
            <div className="ship-features">
              <div className="sf-item"><div className="sf-label">Envío estándar</div><div className="sf-value">3–7 días</div></div>
              <div className="sf-item"><div className="sf-label">Envío express</div><div className="sf-value">1–2 días</div></div>
              <div className="sf-item"><div className="sf-label">Devoluciones</div><div className="sf-value">60 días gratis</div></div>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"center"}}>
            <svg width="360" height="320" viewBox="0 0 400 360" fill="none">
              <circle cx="200" cy="180" r="150" stroke="#222" strokeWidth="1"/>
              <circle cx="200" cy="180" r="110" stroke="#222" strokeWidth="1"/>
              <circle cx="200" cy="180" r="70" stroke="#222" strokeWidth="1"/>
              <ellipse cx="200" cy="180" rx="150" ry="55" stroke="#222" strokeWidth="1"/>
              <ellipse cx="200" cy="180" rx="150" ry="105" stroke="#222" strokeWidth="1"/>
              <line x1="50" y1="180" x2="350" y2="180" stroke="#222" strokeWidth="1"/>
              <line x1="200" y1="30" x2="200" y2="330" stroke="#222" strokeWidth="1"/>
              {[[120,100],[280,130],[170,220],[320,175],[80,175],[200,75],[150,260],[250,240],[310,110]].map(([x,y],i)=>(
                <circle key={i} cx={x} cy={y} r="5" fill="#e8030f" style={{animation:`pulse 2s ${i*0.35}s infinite`}}/>
              ))}
              <circle cx="200" cy="180" r="7" fill="#f5a623"/>
            </svg>
          </div>
        </div>
      </section>

      {/* AI */}
      <section className="s" id="asistente" style={{background:"var(--black)",borderTop:"1px solid var(--border)"}}>
        <div className="ai-grid">
          <div>
            <div className="ai-live"><span className="ai-live-dot"/>Asistente en vivo</div>
            <h2 className="s-title">TU ASESOR<br/>PERSONAL NIKE</h2>
            <p className="ai-desc">¿No sabes qué modelo elegir? ¿Dudas sobre tu talla? Nuestro asistente con inteligencia artificial te guía en segundos, en tu idioma.</p>
            <div className="ai-perks">
              {[["👟","Recomienda modelos según tu actividad"],["📏","Te ayuda a elegir la talla correcta"],["💰","Encuentra las mejores ofertas"],["🌎","Disponible en más de 20 idiomas"],["⚡","Respuestas en tiempo real, 24/7"]].map(([icon,text])=>(
                <div key={text} className="ai-perk"><div className="perk-icon">{icon}</div><span>{text}</span></div>
              ))}
            </div>
          </div>
          <div className="chat-box">
            <div className="ch-head">
              <div className="ch-av">N</div>
              <div><div className="ch-name">Asistente Nike IA</div><div className="ch-sub">Powered by Claude · Responde en tu idioma</div></div>
            </div>
            <div className="ch-msgs" ref={chatRef}>
              {msgs.map((m,i)=>(
                <div key={i} className={`msg ${m.role}`}>
                  <div className="msg-av">{m.role==="ai"?"N":"U"}</div>
                  <div className="msg-bbl">{m.text}</div>
                </div>
              ))}
              {loading&&<div className="msg ai"><div className="msg-av">N</div><div className="msg-bbl"><div className="typing"><span/><span/><span/></div></div></div>}
            </div>
            <div className="quick-btns">
              {["¿Qué oferta tienen hoy?","¿Cuál Air Max me recomiendas?","¿Cómo elijo mi talla?"].map(q=>(
                <button key={q} className="qb" onClick={()=>setInput(q)}>{q}</button>
              ))}
            </div>
            <div className="ch-input-row">
              <input className="ch-input" placeholder="Escribe tu consulta..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()}/>
              <button className="ch-send" onClick={sendMsg} disabled={loading||!input.trim()}>↑</button>
            </div>
          </div>
        </div>
      </section>

      {/* NEWSLETTER */}
      <div className="news">
        <h2 className="news-title">OFERTAS EXCLUSIVAS EN TU EMAIL</h2>
        <p className="news-desc">Únete a más de 2 millones de miembros Nike en todo el mundo</p>
        {subscribed
          ?<p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.5rem",letterSpacing:".1em"}}>✓ ¡Gracias! Te has suscrito exitosamente.</p>
          :<div className="news-form">
            <input className="news-inp" placeholder="Tu correo electrónico" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&email&&setSubscribed(true)}/>
            <button className="news-btn" onClick={()=>email&&setSubscribed(true)}>Suscribirse</button>
          </div>
        }
      </div>

      {/* FOOTER */}
      <footer>
        <div className="ft-grid">
          <div>
            <div className="ft-brand">NIKE ✓</div>
            <p className="ft-tagline">Programa oficial de asociados Nike. Productos auténticos, precios exclusivos y envíos a todo el mundo.</p>
          </div>
          <div>
            <div className="ft-head">Productos</div>
            <div className="ft-links">{["Calzado Running","Lifestyle","Basketball","Ropa","Accesorios"].map(l=><a key={l} href="#">{l}</a>)}</div>
          </div>
          <div>
            <div className="ft-head">Ayuda</div>
            <div className="ft-links">{["Guía de tallas","Envíos","Estado de pedido","Garantía","Contáctanos"].map(l=><a key={l} href="#">{l}</a>)}</div>
          </div>
          <div>
            <div className="ft-head">Asociados</div>
            <div className="ft-links">{["Programa asociados","Comisiones","Marketing","Dashboard","Términos"].map(l=><a key={l} href="#">{l}</a>)}</div>
          </div>
        </div>
        <div className="ft-bottom">
          <span className="ft-legal">© 2026 Nike Affiliate Program · Sitio de asociados autorizado</span>
          <div className="ft-langs">{["ES","EN","PT","FR","DE","JP"].map(l=><a key={l} href="#">{l}</a>)}</div>
        </div>
      </footer>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
